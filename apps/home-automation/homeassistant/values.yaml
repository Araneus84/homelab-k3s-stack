replicaCount: 1

image:
  repository: homeassistant/home-assistant
  tag: "2024.12.5"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

env:
  TZ: "Asia/Jerusalem"

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

service:
  type: ClusterIP
  port: 8123

homepageDiscovery:
  enabled: true
  name: Home Assistant
  group: Home
  icon: si-homeassistant

ingress:
  enabled: true
  className: nginx
  host: ha.home
  annotations: {}

persistence:
  config:
    enabled: true
    storageClass: nfs-client
    size: 10Gi
    accessMode: ReadWriteOnce

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /
    port: 8123
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
