replicaCount: 1

image:
  repository: ghcr.io/gethomepage/homepage
  tag: "v1.7.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

env:
  TZ: "Asia/Jerusalem"
  PUID: "1000"
  PGID: "1000"

# HOMEPAGE_ALLOWED_HOSTS: comma-separated Host headers allowed (v1.0+). Include ingress host;
# add * so browser requests via LAN IP / alternate names work.
allowedHosts: "homepage.home,*"

# List/watch Ingresses cluster-wide so Homepage can discover annotated ingresses (gethomepage.dev/*).
# Init seeds kubernetes.yaml with mode: cluster only if that file is missing (fresh PVC).
kubernetesDiscovery:
  enabled: true

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  host: homepage.home
  annotations: {}

# Self-annotation for Kubernetes discovery (same keys as other apps).
homepageDiscovery:
  enabled: true
  name: Homepage
  group: Dashboard
  icon: si-homepage

# Writable /app/config — Homepage copies skeleton YAML on first start; you edit widgets/services there.
# If you used the old ConfigMap bundle, delete the homepage *-config PVC once so this chart can seed kubernetes.yaml.
persistence:
  config:
    enabled: true
    storageClass: local-path-homelab
    size: 1Gi
    accessMode: ReadWriteOnce

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

strategy:
  type: Recreate
