replicaCount: 1

image:
  repository: ghcr.io/gethomepage/homepage
  tag: "v1.7.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

env:
  TZ: "Asia/Jerusalem"
  PUID: "1000"
  PGID: "1000"

# HOMEPAGE_ALLOWED_HOSTS: comma-separated Host headers allowed (v1.0+). Include ingress host;
# add * so browser requests via LAN IP / alternate names work. Tighten to specific IPs if you prefer.
allowedHosts: "homepage.home,*"

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  host: homepage.home

persistence:
  config:
    enabled: true
    storageClass: local-path-homelab
    size: 1Gi
    accessMode: ReadWriteOnce

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

strategy:
  type: Recreate
