        icon: si-adguard
        href: {{ .Values.urls.adguard }}
        description: DNS filtering
    - Pi-hole:
        icon: pi-hole
        href: {{ .Values.urls.pihole }}
        description: DNS / DHCP

- Media:
    - Plex:
        icon: si-plex
        href: {{ .Values.urls.plex }}
