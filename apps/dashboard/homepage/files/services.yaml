# Templated by Helm — see values.yaml `urls`.
# Prometheus widget/proxy can 500 in some K8s setups; use Grafana for metrics/Prometheus UI.
- Monitoring:
    - Prometheus:
        icon: si-prometheus
        href: {{ .Values.urls.grafana | quote }}
        description: Grafana — metrics, Prometheus targets, Loki logs
    - Argo CD:
        icon: si-argocd
        href: {{ .Values.urls.argocd }}
        description: GitOps / sync status

- Dashboard:
    - Homepage:
        icon: si-homepage
        href: {{ .Values.urls.homepage }}
        description: This dashboard

- DNS:
