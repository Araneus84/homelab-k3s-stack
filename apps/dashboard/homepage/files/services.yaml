    - Sonarr:
        icon: si-sonarr
        href: {{ .Values.urls.sonarr }}
    - Radarr:
        icon: si-radarr
        href: {{ .Values.urls.radarr }}
    - Prowlarr:
        icon: si-prowlarr
        href: {{ .Values.urls.prowlarr }}
    - qBittorrent:
        icon: si-qbittorrent
        href: {{ .Values.urls.qbittorrent }}
    - Autobrr:
        icon: autobrr
        href: {{ .Values.urls.autobrr }}
    - FlareSolverr:
        icon: mdi-cloud-sync
