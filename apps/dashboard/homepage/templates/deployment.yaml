apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "homepage.fullname" . }}
  labels:
    {{- include "homepage.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy.type }}
  selector:
    matchLabels:
      {{- include "homepage.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "homepage.selectorLabels" . | nindent 8 }}
    spec:
{{- if .Values.kubernetesDiscovery.enabled }}
      serviceAccountName: {{ include "homepage.fullname" . }}
{{- end }}
{{- if .Values.kubernetesDiscovery.enabled }}
      initContainers:
        - name: homepage-k8s-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              # Always write: a leftover skeleton kubernetes.yaml (comments only) does not set
              # mode: cluster, so discovery stays off and the UI looks empty.
              printf '%s\n' '---' 'mode: cluster' 'ingress: true' > /config/kubernetes.yaml
          volumeMounts:
            - name: config
              mountPath: /config
{{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: TZ
              value: {{ .Values.env.TZ | quote }}
            - name: PUID
              value: {{ .Values.env.PUID | quote }}
            - name: PGID
              value: {{ .Values.env.PGID | quote }}
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: {{ .Values.allowedHosts | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
{{- if .Values.persistence.config.enabled }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ include "homepage.fullname" . }}-config
{{- else }}
        - name: config
          emptyDir: {}
{{- end }}
