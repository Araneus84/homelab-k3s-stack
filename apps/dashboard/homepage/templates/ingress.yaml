{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "homepage.fullname" . }}
  labels:
    {{- include "homepage.labels" . | nindent 4 }}
{{- $extra := .Values.ingress.annotations | default dict }}
{{- if or .Values.homepageDiscovery.enabled $extra }}
  annotations:
{{- if .Values.homepageDiscovery.enabled }}
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: {{ .Values.homepageDiscovery.name | quote }}
    gethomepage.dev/group: {{ .Values.homepageDiscovery.group | quote }}
{{- with .Values.homepageDiscovery.icon }}
    gethomepage.dev/icon: {{ . | quote }}
{{- end }}
{{- end }}
{{- range $k, $v := $extra }}
    {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "homepage.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
