apiVersion: v1
kind: Service
metadata:
  name: {{ include "adguardhome.fullname" . }}-dns
  labels:
    {{- include "adguardhome.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.dns.type }}
  ports:
    - name: dns-tcp
      port: {{ .Values.service.dns.port }}
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: {{ .Values.service.dns.port }}
      targetPort: dns-udp
      protocol: UDP
  selector:
    {{- include "adguardhome.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adguardhome.fullname" . }}-web
  labels:
    {{- include "adguardhome.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.web.type }}
  ports:
    - name: http
      port: {{ .Values.service.web.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "adguardhome.selectorLabels" . | nindent 4 }}
