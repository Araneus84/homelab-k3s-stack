apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "adguardhome.fullname" . }}
  labels:
    {{- include "adguardhome.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "adguardhome.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "adguardhome.selectorLabels" . | nindent 8 }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: adguardhome
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: conf
              mountPath: /opt/adguardhome/conf
            - name: work
              mountPath: /opt/adguardhome/work
            - name: config
              mountPath: /config/AdGuardHome.yaml
              subPath: AdGuardHome.yaml
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      initContainers:
        - name: init-adguard-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - >
              if [ ! -f /opt/adguardhome/conf/AdGuardHome.yaml ]; then
                cp /config/AdGuardHome.yaml /opt/adguardhome/conf/AdGuardHome.yaml;
              fi
          volumeMounts:
            - name: conf
              mountPath: /opt/adguardhome/conf
            - name: config
              mountPath: /config/AdGuardHome.yaml
              subPath: AdGuardHome.yaml
              readOnly: true
      volumes:
        - name: conf
          persistentVolumeClaim:
            claimName: {{ include "adguardhome.fullname" . }}-conf
        - name: work
          persistentVolumeClaim:
            claimName: {{ include "adguardhome.fullname" . }}-work
        - name: config
          configMap:
            name: {{ include "adguardhome.fullname" . }}-config
{{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
{{- end }}
