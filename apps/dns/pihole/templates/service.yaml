---
# DNS Service - LoadBalancer for port 53 access
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pihole.fullname" . }}-dns
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
  annotations:
    metallb.universe.tf/allow-shared-ip: pihole
spec:
  type: {{ .Values.service.dns.type }}
  {{- if .Values.service.dns.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.dns.loadBalancerIP }}
  {{- end }}
  ports:
    - name: dns-tcp
      port: {{ .Values.service.dns.port }}
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: {{ .Values.service.dns.port }}
      targetPort: dns-udp
      protocol: UDP
  selector:
    {{- include "pihole.selectorLabels" . | nindent 4 }}
---
# Web UI Service - ClusterIP (accessed via Ingress)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pihole.fullname" . }}-web
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.web.type }}
  ports:
    - name: http
      port: {{ .Values.service.web.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "pihole.selectorLabels" . | nindent 4 }}
