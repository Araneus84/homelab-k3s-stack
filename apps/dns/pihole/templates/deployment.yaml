apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pihole.fullname" . }}
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pihole.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pihole.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        # Pi-hole's dnsmasq config can get persisted on the PV with an
        # interface constraint (e.g. `interface=eth0`). When the node is
        # attached to both Wi-Fi and LAN (interface names can change),
        # those constraints can break DNS reachability. We strip the
        # interface constraints on every startup so Pi-hole can answer on
        # whichever interface is currently available.
        - name: fix-pihole-interface-constraints
          image: busybox:1.37
          command:
            - sh
            - -c
            - >
              for f in
              /etc/pihole/setupVars.conf
              /etc/pihole/setupVars.conf.update.bak; do
                if [ -f "$f" ]; then sed -i '/^PIHOLE_INTERFACE=/d' "$f"; fi;
              done;
              if [ -f /etc/dnsmasq.d/01-pihole.conf ]; then
                sed -i '/^interface=/d' /etc/dnsmasq.d/01-pihole.conf;
              fi
          volumeMounts:
            - name: pihole-config
              mountPath: /etc/pihole
            - name: dnsmasq-config
              mountPath: /etc/dnsmasq.d
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: pihole
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.existingSecret }}
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: password
            {{- end }}
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              # WEB_PORT is controlled via env WEB_PORT (defaults to 8081 here),
              # so ensure the named container port matches that.
              containerPort: {{ .Values.service.web.targetPort | default .Values.service.web.port }}
              protocol: TCP
          volumeMounts:
            - name: pihole-config
              mountPath: /etc/pihole
            - name: dnsmasq-config
              mountPath: /etc/dnsmasq.d
            - name: custom-dns
              mountPath: /etc/dnsmasq.d/05-custom.conf
              subPath: 05-custom.conf
              readOnly: true
          livenessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: pihole-config
          persistentVolumeClaim:
            claimName: {{ include "pihole.fullname" . }}-config
        - name: dnsmasq-config
          persistentVolumeClaim:
            claimName: {{ include "pihole.fullname" . }}-dnsmasq
        - name: custom-dns
          configMap:
            name: {{ include "pihole.fullname" . }}-custom-dns
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
