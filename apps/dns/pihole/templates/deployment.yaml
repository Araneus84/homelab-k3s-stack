apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pihole.fullname" . }}
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pihole.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pihole.selectorLabels" . | nindent 8 }}
    spec:
      # securityContext: not set at pod level intentionally.
      # Pi-hole's FTL DNS daemon requires NET_ADMIN (for DHCP/DNS management) and
      # NET_BIND_SERVICE (to bind port 53 as a non-privileged-but-still-special port).
      # These capabilities are injected at the container level via .Values.securityContext.
      # hostNetwork: true is required so FTL can bind directly to the node's DNS port.
      # Restricting to runAsNonRoot or dropping capabilities breaks FTL startup.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: pihole
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.existingSecret }}
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: password
            {{- end }}
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              # WEB_PORT is controlled via env WEB_PORT (defaults to 8081 here),
              # so ensure the named container port matches that.
              containerPort: {{ .Values.service.web.targetPort | default .Values.service.web.port }}
              protocol: TCP
          volumeMounts:
            - name: pihole-config
              mountPath: /etc/pihole
            - name: dnsmasq-config
              mountPath: /etc/dnsmasq.d
            - name: custom-dns
              mountPath: /etc/dnsmasq.d/05-custom.conf
              subPath: 05-custom.conf
              readOnly: true
          livenessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: pihole-config
          persistentVolumeClaim:
            claimName: {{ include "pihole.fullname" . }}-config
        - name: dnsmasq-config
          persistentVolumeClaim:
            claimName: {{ include "pihole.fullname" . }}-dnsmasq
        - name: custom-dns
          configMap:
            name: {{ include "pihole.fullname" . }}-custom-dns
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
