apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pihole.fullname" . }}
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pihole.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pihole.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: fix-pihole-interface-constraints
          # Pi-hole ships dnsmasq config that may pin dns to `eth0`.
          # On a Wi-Fi/LAN dual-homed host, that can break DNS for k8s
          # clients (and DHCP clients). We rewrite it to the current
          # default-route interface before Pi-hole starts.
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - >
              IFACE="$(ip -o route show default 2>/dev/null | awk '{print $5; exit}')"; \
              [ -z "$IFACE" ] && IFACE="$(ip -o link show up 2>/dev/null | awk '$2!="lo:"{gsub(":","",$2); print $2; exit}')"; \
              [ -z "$IFACE" ] && IFACE="lo"; \
              for f in /etc/pihole/setupVars.conf /etc/pihole/setupVars.conf.update.bak; do \
                [ -f "$f" ] && sed -i '/^PIHOLE_INTERFACE=/d' "$f" && echo "PIHOLE_INTERFACE=$IFACE" >> "$f"; \
              done; \
              [ -f /etc/dnsmasq.d/01-pihole.conf ] && sed -i '/^interface=/d' /etc/dnsmasq.d/01-pihole.conf && echo "interface=$IFACE" >> /etc/dnsmasq.d/01-pihole.conf;
          volumeMounts:
            - name: pihole-config
              mountPath: /etc/pihole
            - name: dnsmasq-config
              mountPath: /etc/dnsmasq.d
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: pihole
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.existingSecret }}
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: password
            {{- end }}
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              # WEB_PORT is controlled via env WEB_PORT (defaults to 8081 here),
              # so ensure the named container port matches that.
              containerPort: {{ .Values.service.web.targetPort | default .Values.service.web.port }}
              protocol: TCP
          volumeMounts:
            - name: pihole-config
              mountPath: /etc/pihole
            - name: dnsmasq-config
              mountPath: /etc/dnsmasq.d
            - name: custom-dns
              mountPath: /etc/dnsmasq.d/05-custom.conf
              subPath: 05-custom.conf
              readOnly: true
          livenessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /admin
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: pihole-config
          persistentVolumeClaim:
            claimName: {{ include "pihole.fullname" . }}-config
        - name: dnsmasq-config
          persistentVolumeClaim:
            claimName: {{ include "pihole.fullname" . }}-dnsmasq
        - name: custom-dns
          configMap:
            name: {{ include "pihole.fullname" . }}-custom-dns
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
