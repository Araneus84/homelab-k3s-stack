apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pihole.fullname" . }}-custom-dns
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
data:
  05-custom.conf: |
    # Local DNS overrides for homelab services.
    # Example entries (uncomment and adjust as needed):
    # address=/radarr.home/192.168.50.100
    # address=/sonarr.home/192.168.50.100
    # address=/prowlarr.home/192.168.50.100
    # address=/overseerr.home/192.168.50.100
    # address=/vaultwarden.home/192.168.50.100
