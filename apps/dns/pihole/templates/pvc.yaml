{{- if .Values.persistence.config.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pihole.fullname" . }}-config
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.config.accessMode }}
  storageClassName: {{ .Values.persistence.config.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.config.size }}
{{- end }}
---
{{- if .Values.persistence.dnsmasq.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pihole.fullname" . }}-dnsmasq
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.dnsmasq.accessMode }}
  storageClassName: {{ .Values.persistence.dnsmasq.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.dnsmasq.size }}
{{- end }}
