# Plex Media Server configuration
replicaCount: 1

image:
  repository: plexinc/pms-docker
  tag: "1.41.3.9314-a0bfb8370"
  pullPolicy: IfNotPresent

# Plex requires hostNetwork for GDM (discovery) and DLNA
hostNetwork: true

# Environment
env:
  TZ: "Asia/Jerusalem"
  PLEX_UID: "1000"
  PLEX_GID: "1000"
  # PLEX_CLAIM: ""  # Set via sealed secret for initial setup

# Plex claim token -- use sealed secret for initial server setup
# Generate at: https://www.plex.tv/claim/
existingClaimSecret: ""

service:
  type: ClusterIP
  port: 32400

# Persistent storage for Plex config/metadata
persistence:
  config:
    enabled: true
    storageClass: nfs-client
    size: 20Gi
    accessMode: ReadWriteOnce

# NFS volumes for media (read-only mounts from NAS)
nfsMedia:
  enabled: true
  server: "192.168.50.110"
  movies:
    path: /mnt/HD/HD_a2/NAS
    mountPath: /mnt/nas
  tv:
    path: /mnt/HD/HD_a2/NAS
    mountPath: /mnt/nas

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 4000m
    memory: 4Gi

nodeSelector: {}
tolerations: []
