# Plex Media Server configuration
replicaCount: 1

image:
  repository: plexinc/pms-docker
  tag: "1.41.3.9314-a0bfb8370"
  pullPolicy: IfNotPresent

# Plex requires hostNetwork for GDM (discovery) and DLNA
hostNetwork: true

# Environment
env:
  TZ: "Asia/Jerusalem"
  PLEX_UID: "1000"
  PLEX_GID: "1000"
  CHANGE_CONFIG_DIR_OWNERSHIP: "false"
  # PLEX_CLAIM: ""  # Set via sealed secret for initial setup

# Plex claim token -- use sealed secret for initial server setup
# Generate at: https://www.plex.tv/claim/
existingClaimSecret: ""

service:
  type: ClusterIP
  port: 32400

# Persistent storage for Plex config/metadata
persistence:
  config:
    enabled: true
    storageClass: local-path-homelab
    size: 20Gi
    accessMode: ReadWriteOnce

# Single read-only NFS mount for media (one mountPath; do not duplicate mounts to the same path)
nfsMedia:
  enabled: true
  server: "192.168.50.110"
  path: /mnt/HD/HD_a2/NAS
  mountPath: /mnt/nas

# Plex is single-replica in this setup, so use vertical scaling.
# requests = minimum guaranteed resources
# limits   = maximum allowed resources
resources:
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    cpu: 4000m
    memory: 4Gi

# Keep Plex single-replica on this homelab setup.
# It uses hostNetwork and fixed LAN ports, so horizontal autoscaling
# would conflict on a single-node cluster.
autoscaling:
  enabled: false

nodeSelector: {}
tolerations: []
