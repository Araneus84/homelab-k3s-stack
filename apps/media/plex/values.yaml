# Plex Media Server configuration
replicaCount: 1

image:
  repository: plexinc/pms-docker
  tag: "1.41.3.9314-a0bfb8370"
  pullPolicy: IfNotPresent

# Plex requires hostNetwork for GDM (discovery) and DLNA
hostNetwork: true

# Environment
env:
  TZ: "Asia/Jerusalem"
  PLEX_UID: "1000"
  PLEX_GID: "1000"
  # CHANGE_CONFIG_DIR_OWNERSHIP: "false"
  # PLEX_CLAIM: ""  # Set via sealed secret for initial setup

# Plex claim token -- use sealed secret for initial server setup
# Generate at: https://www.plex.tv/claim/
existingClaimSecret: ""

service:
  type: ClusterIP
  port: 32400

# Ingress for UI + Homepage discovery (PMS still uses hostNetwork for GDM/DLNA).
ingress:
  enabled: true
  className: nginx
  host: plex.home
  annotations: {}

homepageDiscovery:
  enabled: true
  name: Plex
  group: Media
  icon: si-plex

# Active streams + library counts (not per-title “now playing”; for that use Tautulli later).
homepageWidget:
  enabled: true
  fields:
    - streams
    - movies
    - tv
    - albums

# Persistent storage for Plex config/metadata
persistence:
  config:
    enabled: true
    storageClass: local-path-homelab
    size: 20Gi
    accessMode: ReadWriteOnce

# Single read-only NFS mount for media (one mountPath; do not duplicate mounts to the same path)
nfsMedia:
  enabled: true
  server: "192.168.50.110"
  path: /mnt/HD/HD_a2/NAS
  mountPath: /mnt/nas

# Plex is single-replica in this setup, so use vertical scaling.
# requests = minimum guaranteed resources
# limits   = maximum allowed resources
resources:
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    cpu: 4000m
    memory: 4Gi

# Keep Plex single-replica on this homelab setup.
# It uses hostNetwork and fixed LAN ports, so horizontal autoscaling
# would conflict on a single-node cluster.
autoscaling:
  enabled: false

nodeSelector: {}
tolerations: []

# securityContext: intentionally omitted.
# plexinc/pms-docker runs start.sh as root on startup to apply PLEX_UID/PLEX_GID ownership
# to /config and /transcode, then exec's Plex as the configured user. runAsNonRoot conflicts
# with this init sequence. hostNetwork: true (required for GDM/DLNA) also makes strict
# pod-level security contexts operationally complex on a single-node cluster.
# securityContext: {}  # uncomment only if switching to a non-official Plex image
