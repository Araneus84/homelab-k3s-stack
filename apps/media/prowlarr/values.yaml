# Prowlarr indexer manager configuration
replicaCount: 1

image:
  repository: lscr.io/linuxserver/prowlarr
  tag: "1.28.2"
  pullPolicy: IfNotPresent

# Environment
env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Asia/Jerusalem"

service:
  type: ClusterIP
  port: 9696

ingress:
  enabled: true
  className: nginx
  host: prowlarr.home

# Persistent storage for Prowlarr config
persistence:
  config:
    enabled: true
    storageClass: nfs-client
    size: 2Gi
    accessMode: ReadWriteOnce

# NFS volumes (Prowlarr only needs config, no media volumes)
nfsMedia:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
