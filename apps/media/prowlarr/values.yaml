# Prowlarr indexer manager configuration
replicaCount: 1

image:
  repository: lscr.io/linuxserver/prowlarr
  tag: "1.28.2"
  pullPolicy: IfNotPresent

# Environment
env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Asia/Jerusalem"

service:
  type: ClusterIP
  port: 9696

homepageDiscovery:
  enabled: true
  name: Prowlarr
  group: Media
  icon: si-prowlarr

ingress:
  enabled: true
  className: nginx
  host: prowlarr.home
  annotations: {}

# Persistent storage for Prowlarr config
persistence:
  config:
    enabled: true
    storageClass: local-path-homelab
    size: 2Gi
    accessMode: ReadWriteOnce

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
