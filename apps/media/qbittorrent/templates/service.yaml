apiVersion: v1
kind: Service
metadata:
  name: {{ include "qbittorrent.fullname" . }}-web
  labels:
    {{- include "qbittorrent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.web.type }}
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: web
      protocol: TCP
      name: web
  selector:
    {{- include "qbittorrent.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qbittorrent.fullname" . }}-bittorrent
  labels:
    {{- include "qbittorrent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.bittorrent.type }}
  ports:
    - port: {{ .Values.service.bittorrent.port }}
      targetPort: bittorrent-tcp
      protocol: TCP
      name: bittorrent-tcp
      {{- if .Values.service.bittorrent.nodePort }}
      nodePort: {{ .Values.service.bittorrent.nodePort }}
      {{- end }}
    - port: {{ .Values.service.bittorrent.port }}
      targetPort: bittorrent-udp
      protocol: UDP
      name: bittorrent-udp
      {{- if .Values.service.bittorrent.nodePort }}
      nodePort: {{ .Values.service.bittorrent.nodePort }}
      {{- end }}
  selector:
    {{- include "qbittorrent.selectorLabels" . | nindent 4 }}
