{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "qbittorrent.fullname" . }}
  labels:
    {{- include "qbittorrent.labels" . | nindent 4 }}
  {{- $extra := .Values.ingress.annotations | default dict }}
  {{- if or .Values.homepageDiscovery.enabled $extra .Values.homepageWidget.enabled }}
  annotations:
  {{- if .Values.homepageDiscovery.enabled }}
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: {{ .Values.homepageDiscovery.name | quote }}
    gethomepage.dev/group: {{ .Values.homepageDiscovery.group | quote }}
  {{- with .Values.homepageDiscovery.icon }}
    gethomepage.dev/icon: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.homepageWidget.enabled }}
    gethomepage.dev/widget.type: qbittorrent
    gethomepage.dev/widget.url: {{ include "qbittorrent.homepageInternalURL" . | quote }}
    gethomepage.dev/widget.username: {{ print "{{HOMEPAGE_VAR_QBIT_USERNAME}}" | quote }}
    gethomepage.dev/widget.password: {{ print "{{HOMEPAGE_VAR_QBIT_PASSWORD}}" | quote }}
    {{- if .Values.homepageWidget.enableLeechProgress }}
    gethomepage.dev/widget.enableLeechProgress: "true"
    {{- end }}
    {{- if .Values.homepageWidget.enableLeechSize }}
    gethomepage.dev/widget.enableLeechSize: "true"
    {{- end }}
  {{- end }}
  {{- if $extra }}
    {{- toYaml $extra | nindent 4 }}
  {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "qbittorrent.fullname" . }}-web
                port:
                  number: {{ .Values.service.web.port }}
{{- end }}
