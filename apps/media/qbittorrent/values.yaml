replicaCount: 1

image:
  repository: lscr.io/linuxserver/qbittorrent
  tag: "5.0.4"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Asia/Jerusalem"

service:
  web:
    type: ClusterIP
    port: 8080
  bittorrent:
    type: NodePort
    port: 6881

homepageDiscovery:
  enabled: true
  name: qBittorrent
  group: Media
  icon: si-qbittorrent

# Homepage service widget (API via in-cluster URL; set HOMEPAGE_VAR_* on the Homepage deployment).
homepageWidget:
  enabled: true
  enableLeechProgress: true
  enableLeechSize: true

ingress:
  enabled: true
  className: nginx
  host: qbit.home
  annotations: {}

persistence:
  config:
    enabled: true
    storageClass: nfs-client
    size: 2Gi
    accessMode: ReadWriteOnce

nfs:
  downloads:
    server: 192.168.50.110
    path: /mnt/HD/HD_a2/NAS
    mountPath: /mnt/nas

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

securityContext:
  runAsUser: 1000
  runAsGroup: 1000

strategy:
  type: Recreate
