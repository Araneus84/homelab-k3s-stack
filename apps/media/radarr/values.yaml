# Radarr movie management configuration
replicaCount: 1

image:
  repository: lscr.io/linuxserver/radarr
  tag: "5.16.3"
  pullPolicy: IfNotPresent

# Environment
env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Asia/Jerusalem"

service:
  type: ClusterIP
  port: 7878

ingress:
  enabled: true
  className: nginx
  host: radarr.home

# Persistent storage for Radarr config
persistence:
  config:
    enabled: true
    storageClass: nfs-client
    size: 5Gi
    accessMode: ReadWriteOnce

# NFS volumes for media from NAS
nfsMedia:
  enabled: true
  server: "192.168.50.110"
  downloads:
    path: /mnt/HD/HD_a2/NAS/downloads
    mountPath: /downloads
  media:
    path: /mnt/HD/HD_a2/NAS/Movies
    mountPath: /Movies

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
