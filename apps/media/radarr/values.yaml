# Radarr movie management configuration
replicaCount: 1

image:
  repository: lscr.io/linuxserver/radarr
  tag: latest
  pullPolicy: Always

# Environment
env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Asia/Jerusalem"

service:
  type: ClusterIP
  port: 7878

homepageDiscovery:
  enabled: true
  name: Radarr
  group: Media
  icon: si-radarr

ingress:
  enabled: true
  className: nginx
  host: radarr.home
  annotations: {}

# Persistent storage for Radarr config
persistence:
  config:
    enabled: true
    storageClass: local-path-homelab
    size: 5Gi
    accessMode: ReadWriteOnce

# NFS: NAS export path (server filesystem) vs mountPath (inside container; match qBittorrent)
nfsMedia:
  enabled: true
  server: "192.168.50.110"
  path: /mnt/HD/HD_a2/NAS
  mountPath: /mnt/nas
  downloadsAliasPath: /downloads

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
