apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "radarr.fullname" . }}
  labels:
    {{- include "radarr.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "radarr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "radarr.selectorLabels" . | nindent 8 }}
    spec:
      # securityContext omitted: lscr.io/linuxserver/radarr uses s6-overlay which requires
      # the process to start as root so s6 can apply PUID/PGID ownership before dropping
      # privileges to the 'abc' user. runAsNonRoot or runAsUser: 1000 conflicts with s6-overlay
      # init and causes crash-loops. UID/GID are controlled via PUID and PGID env vars.
      containers:
        - name: radarr
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            {{- if .Values.nfsMedia.enabled }}
            - name: downloads
              mountPath: {{ .Values.nfsMedia.downloads.mountPath }}
            - name: media
              mountPath: {{ .Values.nfsMedia.media.mountPath }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: {{ include "radarr.fullname" . }}-config
        {{- if .Values.nfsMedia.enabled }}
        - name: downloads
          nfs:
            server: {{ .Values.nfsMedia.server }}
            path: {{ .Values.nfsMedia.downloads.path }}
        - name: media
          nfs:
            server: {{ .Values.nfsMedia.server }}
            path: {{ .Values.nfsMedia.media.path }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
