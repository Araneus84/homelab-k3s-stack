replicaCount: 1

image:
  repository: vaultwarden/server
  tag: "1.32.7"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

env:
  WEB_VAULT_ENABLED: "true"
  ROCKET_PORT: "8070"
  DOMAIN: "https://vaultwarden.home"

adminToken:
  existingSecret: vaultwarden-admin
  key: admin-token

sealedSecret:
  enabled: false

service:
  type: ClusterIP
  port: 8070

homepageDiscovery:
  enabled: true
  name: Vaultwarden
  group: Security
  icon: si-vaultwarden

ingress:
  enabled: true
  className: nginx
  host: vaultwarden.home
  annotations: {}

persistence:
  data:
    enabled: true
    storageClass: nfs-client
    size: 5Gi
    accessMode: ReadWriteOnce
    mountPath: /data

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
