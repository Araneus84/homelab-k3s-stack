# Subchart: grafana/loki
loki:
  fullnameOverride: loki
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      storageClass: local-path-homelab
      size: 20Gi
    tolerations:
      - operator: Exists
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    useTestSchema: true
  gateway:
    enabled: false
  test:
    enabled: false
  lokiCanary:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

# Subchart: grafana/promtail
promtail:
  fullnameOverride: promtail
  tolerations:
    - operator: Exists
  config:
    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
