apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cluster-backup.fullname" . }}
  labels:
    {{- include "cluster-backup.labels" . | nindent 4 }}
rules:
  # Core / workloads (no secrets)
  - apiGroups: [""]
    resources:
      - configmaps
      - endpoints
      - limitranges
      - namespaces
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - replicationcontrollers
      - resourcequotas
      - serviceaccounts
      - services
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: [daemonsets, deployments, replicasets, statefulsets]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: [cronjobs, jobs]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: [horizontalpodautoscalers]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: [ingresses, networkpolicies]
    verbs: ["get", "list"]
  - apiGroups: ["discovery.k8s.io"]
    resources: [endpointslices]
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources: [poddisruptionbudgets]
    verbs: ["get", "list"]
  # GitOps / TLS / sealed config
  - apiGroups: ["argoproj.io"]
    resources: [applications, applicationsets, appprojects]
    verbs: ["get", "list"]
  - apiGroups: ["argocd-image-updater.argoproj.io"]
    resources: [imageupdaters]
    verbs: ["get", "list"]
  - apiGroups: ["bitnami.com"]
    resources: [sealedsecrets]
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - certificaterequests
      - clusterissuers
      - issuers
    verbs: ["get", "list"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: [prometheusrules, servicemonitors, podmonitors, alertmanagers, prometheuses]
    verbs: ["get", "list"]
