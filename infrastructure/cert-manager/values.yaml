cert-manager:
  installCRDs: true
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true

# Use a ClusterIssuer for Let's Encrypt Staging by default
# For production, change the server URL
clusterIssuer:
  email: "your-email@example.com"
  server: "https://acme-staging-v02.api.letsencrypt.org/directory"
