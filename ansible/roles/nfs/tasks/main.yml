---
# ==============================================================================
# Role: nfs - NFS client setup and mounts
# ==============================================================================

- name: Install NFS client packages
  ansible.builtin.apt:
    name:
      - nfs-common
      - nfs4-acl-tools
    state: present

- name: Create NFS mount points
  ansible.builtin.file:
    path: "{{ item.dest }}"
    state: directory
    owner: "{{ primary_user }}"
    group: "{{ primary_user }}"
    mode: "0755"
  loop: "{{ nfs_shares }}"

- name: Configure NFS mounts in fstab
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.dest }}"
    fstype: nfs
    opts: "{{ nfs_mount_opts }}"
    state: mounted
  loop: "{{ nfs_shares }}"

- name: Verify NFS mounts are accessible
  ansible.builtin.command: "ls {{ item.dest }}"
  loop: "{{ nfs_shares }}"
  register: nfs_check
  changed_when: false
  failed_when: nfs_check.rc != 0

- name: Display NFS mount status
  ansible.builtin.debug:
    msg: "NFS mount {{ item.item.dest }} is accessible"
  loop: "{{ nfs_check.results }}"
  when: item.rc == 0
