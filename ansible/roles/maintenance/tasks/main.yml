---
# ==============================================================================
# Role: maintenance - Ongoing system maintenance
# ==============================================================================

# --- System Updates ---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Install security updates only
  ansible.builtin.apt:
    upgrade: safe
    autoremove: true
    autoclean: true

# --- Unattended Upgrades ---
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present

- name: Enable unattended-upgrades for security patches
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: "0644"

# --- Log Rotation ---
- name: Configure k3s log rotation
  ansible.builtin.copy:
    dest: /etc/logrotate.d/k3s
    content: |
      /var/log/syslog {
        rotate 7
        daily
        missingok
        notifempty
        compress
        delaycompress
      }
    mode: "0644"

# --- NFS Health Check ---
- name: Verify NFS mounts are still accessible
  ansible.builtin.command: "mountpoint -q {{ nfs_mount_point }}"
  register: nfs_mount_check
  changed_when: false
  failed_when: false

- name: Remount NFS if needed
  ansible.builtin.command: "mount {{ nfs_mount_point }}"
  when: nfs_mount_check.rc != 0
  changed_when: true

# --- k3s Service Health ---
- name: Verify k3s service is running
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true

- name: Check k3s node status
  ansible.builtin.command: k3s kubectl get nodes
  register: node_status
  changed_when: false

- name: Warn if node is not Ready
  ansible.builtin.debug:
    msg: "WARNING: Node may not be ready. Status: {{ node_status.stdout }}"
  when: "'NotReady' in node_status.stdout"

# --- Disk Space Check ---
- name: Check disk space
  ansible.builtin.command: df -h /
  register: disk_space
  changed_when: false

- name: Display disk usage
  ansible.builtin.debug:
    msg: "{{ disk_space.stdout_lines }}"

# --- Clean up old container images ---
- name: Prune unused container images (k3s crictl)
  ansible.builtin.command: k3s crictl rmi --prune
  changed_when: true
  failed_when: false
