apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-backup
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Araneus84/homelab-k3s-stack.git
    targetRevision: main
    path: infrastructure/cluster-backup
  destination:
    server: https://kubernetes.default.svc
    namespace: backup
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
