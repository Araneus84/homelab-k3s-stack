name: Plex Version Watch

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-plex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for newer Plex minor/major
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path

          values_path = Path("apps/media/plex/values.yaml")
          text = values_path.read_text(encoding="utf-8")

          current_match = re.search(r'tag:\s*"([^"]+)"', text)
          if not current_match:
              raise SystemExit("Could not find current Plex tag in values.yaml")
          current_tag = current_match.group(1)

          m = re.match(r"^(\d+)\.(\d+)\.(\d+)\.(\d+)-", current_tag)
          if not m:
              raise SystemExit(f"Current tag format not supported: {current_tag}")
          cur_major, cur_minor, *_ = map(int, m.groups())

          url = "https://hub.docker.com/v2/namespaces/plexinc/repositories/pms-docker/tags?page_size=100"
          best = None

          while url:
              with urllib.request.urlopen(url, timeout=30) as resp:
                  data = json.loads(resp.read().decode("utf-8"))

              for item in data.get("results", []):
                  name = item.get("name", "")
                  n = re.match(r"^(\d+)\.(\d+)\.(\d+)\.(\d+)-[a-z0-9]+(?:-amd64)?$", name)
                  if not n:
                      continue
                  major, minor, patch, build = map(int, n.groups())
                  candidate = (major, minor, patch, build, name)
                  if best is None or candidate[:4] > best[:4]:
                      best = candidate

              url = data.get("next")

          if best is None:
              raise SystemExit("No matching Plex tags found on Docker Hub")

          new_major, new_minor, *_rest, latest_tag = best
          needs_notice = (new_major > cur_major) or (new_major == cur_major and new_minor > cur_minor)

          issue_body = (
              f"A newer Plex minor/major release is available.\n\n"
              f"- Current pinned tag: `{current_tag}`\n"
              f"- Latest discovered tag: `{latest_tag}`\n\n"
              "Patch updates in the pinned line are already automatic via Argo CD Image Updater.\n"
              "This issue is only for manual review of minor/major upgrades."
          )

          if not needs_notice:
              print("No newer minor/major release detected.")
              raise SystemExit(0)

          title = f"Plex update available: {latest_tag}"
          repo = "${{ github.repository }}"

          # Avoid duplicate weekly issues for the same target tag.
          search_url = (
              "https://api.github.com/search/issues?q="
              + urllib.parse.quote(f'repo:{repo} is:issue is:open in:title "{title}"')
          )
          search_req = urllib.request.Request(
              search_url,
              headers={
                  "Authorization": f"Bearer {__import__('os').environ['GITHUB_TOKEN']}",
                  "Accept": "application/vnd.github+json",
              },
          )
          with urllib.request.urlopen(search_req, timeout=30) as resp:
              search_data = json.loads(resp.read().decode("utf-8"))
          if search_data.get("total_count", 0) > 0:
              print("Matching open issue already exists; skipping.")
              raise SystemExit(0)

          issues_url = f"https://api.github.com/repos/{repo}/issues"
          req = urllib.request.Request(
              issues_url,
              method="POST",
              headers={
                  "Authorization": f"Bearer {__import__('os').environ['GITHUB_TOKEN']}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
              },
              data=json.dumps({"title": title, "body": issue_body, "labels": ["dependencies", "plex"]}).encode("utf-8"),
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              print(f"Created issue, status={resp.status}")
          PY
